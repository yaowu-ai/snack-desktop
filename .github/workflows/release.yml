name: Release

on:
  push:
    branches: ["test"]
    tags: ["v*", "*.*.*"]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write

jobs:
  build-macos:
    name: macOS (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Apple Silicon
            runner: macos-latest
            target: aarch64-apple-darwin
            rust_target: aarch64-apple-darwin
            dmg_arch_suffix: apple-silicon
            release_arch_suffix: arm64
            artifact_label: apple-silicon
          - name: Intel
            runner: macos-26-intel
            target: x86_64-apple-darwin
            rust_target: x86_64-apple-darwin
            dmg_arch_suffix: intel
            release_arch_suffix: x64
            artifact_label: intel
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust target
        run: rustup target add ${{ matrix.rust_target }}

      - name: Install frontend dependencies
        run: npm ci

      - name: Prepare release context
        id: version
        uses: ./.github/actions/prepare-release-context

      - name: Validate required secrets
        shell: bash
        env:
          TAURI_UPDATER_PUBKEY: ${{ secrets.TAURI_UPDATER_PUBKEY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          missing=0
          for name in \
            TAURI_UPDATER_PUBKEY \
            TAURI_SIGNING_PRIVATE_KEY \
            APPLE_CERTIFICATE \
            APPLE_CERTIFICATE_PASSWORD \
            APPLE_SIGNING_IDENTITY \
            APPLE_ID \
            APPLE_PASSWORD \
            APPLE_TEAM_ID
          do
            if [[ -z "${!name}" ]]; then
              echo "::error::Missing required GitHub secret: ${name}"
              missing=1
            fi
          done
          exit "$missing"

      - name: Validate updater signing key
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          printf 'snack updater signing check' > "$RUNNER_TEMP/updater-signing-check.txt"
          npx tauri signer sign \
            -k "$TAURI_SIGNING_PRIVATE_KEY" \
            ${TAURI_SIGNING_PRIVATE_KEY_PASSWORD:+-p "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD"} \
            "$RUNNER_TEMP/updater-signing-check.txt" >/dev/null

      - name: Import Apple certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          echo "$APPLE_CERTIFICATE" | base64 --decode > $RUNNER_TEMP/certificate.p12

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$RUNNER_TEMP/certificate.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign

          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Package signed macOS app
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_UPDATER_PUBKEY: ${{ secrets.TAURI_UPDATER_PUBKEY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          SNACK_PROD_HOST: ${{ vars.SNACK_PROD_HOST }}
          SNACK_QA_HOST: ${{ vars.SNACK_QA_HOST }}
          SNACK_PROD_UPDATER_ENDPOINT: ${{ secrets.SNACK_PROD_UPDATER_ENDPOINT }}
          SNACK_QA_UPDATER_ENDPOINT: ${{ secrets.SNACK_QA_UPDATER_ENDPOINT }}
          SNACK_DESKTOP_BASE_UA: ${{ secrets.SNACK_DESKTOP_BASE_UA }}
          TARGET_TRIPLE: ${{ matrix.target }}
          APP_VERSION: ${{ steps.version.outputs.artifact_version }}
          DMG_ARCH_SUFFIX: ${{ matrix.dmg_arch_suffix }}
        run: bash scripts/package-macos-release.sh

      - name: Upload macOS bundle to Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v1
        with:
          files: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/Snack_${{ steps.version.outputs.artifact_version }}_macos_${{ matrix.release_arch_suffix }}.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/Snack_${{ steps.version.outputs.artifact_version }}_macos_${{ matrix.release_arch_suffix }}.app.tar.gz
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/Snack_${{ steps.version.outputs.artifact_version }}_macos_${{ matrix.release_arch_suffix }}.app.tar.gz.sig
          token: ${{ secrets.GITHUB_TOKEN }}
          prerelease: ${{ steps.version.outputs.release_prerelease }}
          make_latest: ${{ steps.version.outputs.release_make_latest }}
          fail_on_unmatched_files: true

      - name: Upload macOS bundle artifact
        if: github.ref == 'refs/heads/test'
        uses: actions/upload-artifact@v4
        with:
          name: Snack-${{ steps.version.outputs.artifact_version }}-${{ matrix.artifact_label }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/Snack_${{ steps.version.outputs.artifact_version }}_macos_${{ matrix.release_arch_suffix }}.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/Snack_${{ steps.version.outputs.artifact_version }}_macos_${{ matrix.release_arch_suffix }}.app.tar.gz
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/Snack_${{ steps.version.outputs.artifact_version }}_macos_${{ matrix.release_arch_suffix }}.app.tar.gz.sig
          if-no-files-found: error

  build-windows-x64:
    name: Windows (x64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Prepare release context
        id: version
        uses: ./.github/actions/prepare-release-context

      - name: Validate required secrets
        shell: bash
        env:
          TAURI_UPDATER_PUBKEY: ${{ secrets.TAURI_UPDATER_PUBKEY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          missing=0
          for name in TAURI_UPDATER_PUBKEY TAURI_SIGNING_PRIVATE_KEY
          do
            if [[ -z "${!name}" ]]; then
              echo "::error::Missing required GitHub secret: ${name}"
              missing=1
            fi
          done
          exit "$missing"

      - name: Validate updater signing key
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          printf 'snack updater signing check' > "$RUNNER_TEMP/updater-signing-check.txt"
          npx tauri signer sign \
            -k "$TAURI_SIGNING_PRIVATE_KEY" \
            ${TAURI_SIGNING_PRIVATE_KEY_PASSWORD:+-p "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD"} \
            "$RUNNER_TEMP/updater-signing-check.txt" >/dev/null

      - name: Build Tauri app
        run: npm run build -- --bundles nsis
        env:
          CI: true
          SNACK_CREATE_UPDATER_ARTIFACTS: false
          TAURI_UPDATER_PUBKEY: ${{ secrets.TAURI_UPDATER_PUBKEY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          SNACK_PROD_HOST: ${{ vars.SNACK_PROD_HOST }}
          SNACK_QA_HOST: ${{ vars.SNACK_QA_HOST }}
          SNACK_PROD_UPDATER_ENDPOINT: ${{ secrets.SNACK_PROD_UPDATER_ENDPOINT }}
          SNACK_QA_UPDATER_ENDPOINT: ${{ secrets.SNACK_QA_UPDATER_ENDPOINT }}
          SNACK_DESKTOP_BASE_UA: ${{ secrets.SNACK_DESKTOP_BASE_UA }}

      - name: Stage Windows bundle artifacts
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          SRC_DIR="src-tauri/target/release/bundle/nsis"
          DST_DIR="artifacts/Snack-${{ steps.version.outputs.artifact_version }}-windows-x64"
          mkdir -p "$DST_DIR"

          find "$SRC_DIR" -type f -name '*.exe' -print0 | while IFS= read -r -d '' src; do
            filename="Snack_${{ steps.version.outputs.artifact_version }}_windows_x64.exe"
            cp "$src" "$DST_DIR/$filename"
          done

          EXE_PATH="$DST_DIR/Snack_${{ steps.version.outputs.artifact_version }}_windows_x64.exe"
          if [[ ! -s "$EXE_PATH" ]]; then
            echo "Expected Windows installer not found: $EXE_PATH" >&2
            exit 1
          fi

          SIGNATURE_PATH="${EXE_PATH}.sig"
          rm -f "$SIGNATURE_PATH"
          SIGN_OUTPUT="$(npx tauri signer sign \
            -k "$TAURI_SIGNING_PRIVATE_KEY" \
            ${TAURI_SIGNING_PRIVATE_KEY_PASSWORD:+-p "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD"} \
            "$EXE_PATH")"
          if [[ ! -s "$SIGNATURE_PATH" ]]; then
            printf '%s\n' "$SIGN_OUTPUT" | awk '/^Public signature:/{getline; print; exit}' > "$SIGNATURE_PATH"
            if [[ ! -s "$SIGNATURE_PATH" ]]; then
              echo "Failed to extract Windows updater signature." >&2
              printf '%s\n' "$SIGN_OUTPUT" >&2
              exit 1
            fi
          fi

          find "$DST_DIR" -maxdepth 1 -type f -print

      - name: Upload Windows bundle to Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/Snack-${{ steps.version.outputs.artifact_version }}-windows-x64/*
          token: ${{ secrets.GITHUB_TOKEN }}
          prerelease: ${{ steps.version.outputs.release_prerelease }}
          make_latest: ${{ steps.version.outputs.release_make_latest }}
          fail_on_unmatched_files: true

      - name: Upload Windows bundle artifact
        if: github.ref == 'refs/heads/test'
        uses: actions/upload-artifact@v4
        with:
          name: Snack-${{ steps.version.outputs.artifact_version }}-windows-x64
          path: artifacts/Snack-${{ steps.version.outputs.artifact_version }}-windows-x64/*
          if-no-files-found: error
