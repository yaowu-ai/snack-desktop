            src-tauri/target/x86_64-apple-darwin/release/bundle/macos/Snack_${{ steps.version.outputs.artifact_version }}_macos_x64.app.tar.gz.sig
          if-no-files-found: error

  build-windows-x64:
    name: Windows (x64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate release tag belongs to prod
        if: github.ref_type == 'tag'
        shell: bash
        run: |
          git fetch origin prod
          TAG_COMMIT="$(git rev-list -n 1 "${GITHUB_REF_NAME}")"
          if ! git merge-base --is-ancestor "${TAG_COMMIT}" origin/prod; then
            echo "::error::Release tag ${GITHUB_REF_NAME} must point to a commit contained in origin/prod."
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Resolve app version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            APP_VERSION="${GITHUB_REF_NAME#v}"
            ARTIFACT_VERSION="$APP_VERSION"
          else
            APP_VERSION="$(node -p "require('./package.json').version")"
            SHORT_SHA="${GITHUB_SHA:0:7}"
            ARTIFACT_VERSION="${APP_VERSION}-qa.${GITHUB_RUN_NUMBER}.${SHORT_SHA}"
          fi

          echo "Building app version: $APP_VERSION"
          echo "Artifact version: $ARTIFACT_VERSION"
          node -e "
            const fs = require('fs');
            const conf = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
            conf.version = '$APP_VERSION';
            fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(conf, null, 2) + '\n');
          "
          echo "SNACK_DESKTOP_VERSION=$ARTIFACT_VERSION" >> "$GITHUB_ENV"
          echo "app_version=$APP_VERSION" >> "$GITHUB_OUTPUT"
          echo "artifact_version=$ARTIFACT_VERSION" >> "$GITHUB_OUTPUT"

      - name: Validate required secrets
        shell: bash
        env:
          TAURI_UPDATER_PUBKEY: ${{ secrets.TAURI_UPDATER_PUBKEY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          missing=0
          for name in TAURI_UPDATER_PUBKEY TAURI_SIGNING_PRIVATE_KEY
          do
            if [[ -z "${!name}" ]]; then
              echo "::error::Missing required GitHub secret: ${name}"
              missing=1
            fi
          done
          exit "$missing"

      - name: Validate updater signing key
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          printf 'snack updater signing check' > "$RUNNER_TEMP/updater-signing-check.txt"
          npx tauri signer sign \
            -k "$TAURI_SIGNING_PRIVATE_KEY" \
            ${TAURI_SIGNING_PRIVATE_KEY_PASSWORD:+-p "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD"} \
            "$RUNNER_TEMP/updater-signing-check.txt" >/dev/null

      - name: Build Tauri app
        run: npm run build -- --bundles nsis
        env:
          CI: true
          TAURI_UPDATER_PUBKEY: ${{ secrets.TAURI_UPDATER_PUBKEY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          SNACK_PROD_HOST: ${{ vars.SNACK_PROD_HOST }}
          SNACK_QA_HOST: ${{ vars.SNACK_QA_HOST }}
          SNACK_PROD_UPDATER_ENDPOINT: ${{ secrets.SNACK_PROD_UPDATER_ENDPOINT }}
          SNACK_QA_UPDATER_ENDPOINT: ${{ secrets.SNACK_QA_UPDATER_ENDPOINT }}
          SNACK_DESKTOP_BASE_UA: ${{ secrets.SNACK_DESKTOP_BASE_UA }}

      - name: Stage Windows bundle artifacts
        shell: bash
        run: |
          SRC_DIR="src-tauri/target/release/bundle/nsis"
          DST_DIR="artifacts/Snack-${{ steps.version.outputs.artifact_version }}-windows-x64"
          mkdir -p "$DST_DIR"

          find "$SRC_DIR" -type f -name '*.exe' -print0 | while IFS= read -r -d '' src; do
            filename="$(basename "$src")"
            filename="${filename//${{ steps.version.outputs.app_version }}/${{ steps.version.outputs.artifact_version }}}"
            filename="Snack_${{ steps.version.outputs.artifact_version }}_windows_x64.exe"
            cp "$src" "$DST_DIR/$filename"
          done

          find "$SRC_DIR" -type f -name '*.sig' -print0 | while IFS= read -r -d '' src; do
            cp "$src" "$DST_DIR/Snack_${{ steps.version.outputs.artifact_version }}_windows_x64.exe.sig"
          done

          find "$DST_DIR" -maxdepth 1 -type f -print

      - name: Upload Windows bundle to Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/Snack-${{ steps.version.outputs.artifact_version }}-windows-x64/*
          token: ${{ secrets.GITHUB_TOKEN }}
          fail_on_unmatched_files: true

      - name: Upload Windows bundle artifact
        if: github.ref == 'refs/heads/test'
        uses: actions/upload-artifact@v4
        with:
          name: Snack-${{ steps.version.outputs.artifact_version }}-windows-x64
          path: artifacts/Snack-${{ steps.version.outputs.artifact_version }}-windows-x64/*
          if-no-files-found: error
