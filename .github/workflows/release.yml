name: Release

on:
  push:
    branches: ["test"]
    tags: ["v*", "*.*.*"]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write

jobs:
  build-macos-arm64:
    name: macOS (Apple Silicon)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate release tag belongs to prod
        if: github.ref_type == 'tag'
        shell: bash
        run: |
          git fetch origin prod
          TAG_COMMIT="$(git rev-list -n 1 "${GITHUB_REF_NAME}")"
          if ! git merge-base --is-ancestor "${TAG_COMMIT}" origin/prod; then
            echo "::error::Release tag ${GITHUB_REF_NAME} must point to a commit contained in origin/prod."
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust target (aarch64)
        run: rustup target add aarch64-apple-darwin

      - name: Install frontend dependencies
        run: npm ci

      - name: Resolve app version
        id: version
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            APP_VERSION="${GITHUB_REF_NAME#v}"
            ARTIFACT_VERSION="$APP_VERSION"
          else
            APP_VERSION="$(node -p "require('./package.json').version")"
            SHORT_SHA="${GITHUB_SHA:0:7}"
            ARTIFACT_VERSION="${APP_VERSION}-qa.${GITHUB_RUN_NUMBER}.${SHORT_SHA}"
          fi

          echo "Building app version: $APP_VERSION"
          echo "Artifact version: $ARTIFACT_VERSION"
          node -e "
            const fs = require('fs');
            const conf = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
            conf.version = '$APP_VERSION';
            fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(conf, null, 2) + '\n');
          "
          echo "SNACK_DESKTOP_VERSION=$ARTIFACT_VERSION" >> "$GITHUB_ENV"
          echo "app_version=$APP_VERSION" >> "$GITHUB_OUTPUT"
          echo "artifact_version=$ARTIFACT_VERSION" >> "$GITHUB_OUTPUT"

      - name: Validate required secrets
        shell: bash
        env:
          TAURI_UPDATER_PUBKEY: ${{ secrets.TAURI_UPDATER_PUBKEY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          missing=0
          for name in \
            TAURI_UPDATER_PUBKEY \
            TAURI_SIGNING_PRIVATE_KEY \
            APPLE_CERTIFICATE \
            APPLE_CERTIFICATE_PASSWORD \
            APPLE_SIGNING_IDENTITY \
            APPLE_ID \
            APPLE_PASSWORD \
            APPLE_TEAM_ID
          do
            if [[ -z "${!name}" ]]; then
              echo "::error::Missing required GitHub secret: ${name}"
              missing=1
            fi
          done
          exit "$missing"

      - name: Validate updater signing key
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          printf 'snack updater signing check' > "$RUNNER_TEMP/updater-signing-check.txt"
          npx tauri signer sign \
            -k "$TAURI_SIGNING_PRIVATE_KEY" \
            ${TAURI_SIGNING_PRIVATE_KEY_PASSWORD:+-p "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD"} \
            "$RUNNER_TEMP/updater-signing-check.txt" >/dev/null

      - name: Import Apple certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          echo "$APPLE_CERTIFICATE" | base64 --decode > $RUNNER_TEMP/certificate.p12

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$RUNNER_TEMP/certificate.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign

          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Package signed macOS app (arm64)
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_UPDATER_PUBKEY: ${{ secrets.TAURI_UPDATER_PUBKEY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          SNACK_PROD_HOST: ${{ vars.SNACK_PROD_HOST }}
          SNACK_QA_HOST: ${{ vars.SNACK_QA_HOST }}
          SNACK_PROD_UPDATER_ENDPOINT: ${{ secrets.SNACK_PROD_UPDATER_ENDPOINT }}
          SNACK_QA_UPDATER_ENDPOINT: ${{ secrets.SNACK_QA_UPDATER_ENDPOINT }}
          SNACK_DESKTOP_BASE_UA: ${{ secrets.SNACK_DESKTOP_BASE_UA }}
          TARGET_TRIPLE: aarch64-apple-darwin
          APP_VERSION: ${{ steps.version.outputs.artifact_version }}
          DMG_ARCH_SUFFIX: apple-silicon
        run: bash scripts/package-macos-release.sh

      - name: Upload arm64 DMG to Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v1
        with:
          files: |
            src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/Snack_${{ steps.version.outputs.artifact_version }}_macos_arm64.dmg
            src-tauri/target/aarch64-apple-darwin/release/bundle/macos/Snack_${{ steps.version.outputs.artifact_version }}_macos_arm64.app.tar.gz
            src-tauri/target/aarch64-apple-darwin/release/bundle/macos/Snack_${{ steps.version.outputs.artifact_version }}_macos_arm64.app.tar.gz.sig
          token: ${{ secrets.GITHUB_TOKEN }}
          fail_on_unmatched_files: true

      - name: Upload arm64 DMG artifact
        if: github.ref == 'refs/heads/test'
        uses: actions/upload-artifact@v4
        with:
          name: Snack-${{ steps.version.outputs.artifact_version }}-apple-silicon
          path: |
            src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/Snack_${{ steps.version.outputs.artifact_version }}_macos_arm64.dmg
            src-tauri/target/aarch64-apple-darwin/release/bundle/macos/Snack_${{ steps.version.outputs.artifact_version }}_macos_arm64.app.tar.gz
            src-tauri/target/aarch64-apple-darwin/release/bundle/macos/Snack_${{ steps.version.outputs.artifact_version }}_macos_arm64.app.tar.gz.sig
          if-no-files-found: error

  build-macos-x64:
    name: macOS (Intel)
    runs-on: macos-26-intel
    steps:
