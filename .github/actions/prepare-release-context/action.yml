name: Prepare release context
description: Resolve Snack desktop release channel, version, and build environment.

outputs:
  app_version:
    description: Version written into tauri.conf.json.
    value: ${{ steps.context.outputs.app_version }}
  artifact_version:
    description: Version used in artifact file names and SnackDesktop UA.
    value: ${{ steps.context.outputs.artifact_version }}
  release_channel:
    description: Resolved release channel, prod or qa.
    value: ${{ steps.context.outputs.release_channel }}
  release_prerelease:
    description: Whether GitHub Release uploads should be marked as prerelease.
    value: ${{ steps.context.outputs.release_prerelease }}
  release_make_latest:
    description: softprops/action-gh-release make_latest value.
    value: ${{ steps.context.outputs.release_make_latest }}

runs:
  using: composite
  steps:
    - id: context
      shell: bash
      run: |
        set -euo pipefail

        RELEASE_CHANNEL=""
        RELEASE_PRERELEASE="false"
        RELEASE_MAKE_LATEST="false"

        if [[ "${GITHUB_REF_TYPE}" != "tag" ]]; then
          echo "::error::Unsupported release ref ${GITHUB_REF}. Release builds must be triggered by a tag."
          exit 1
        fi

        git fetch origin prod test
        TAG_COMMIT="$(git rev-list -n 1 "${GITHUB_REF_NAME}")"

        if git merge-base --is-ancestor "${TAG_COMMIT}" origin/prod; then
          RELEASE_CHANNEL="prod"
          RELEASE_PRERELEASE="false"
          RELEASE_MAKE_LATEST="true"
        elif git merge-base --is-ancestor "${TAG_COMMIT}" origin/test; then
          RELEASE_CHANNEL="qa"
          RELEASE_PRERELEASE="true"
          RELEASE_MAKE_LATEST="false"
        else
          echo "::error::Release tag ${GITHUB_REF_NAME} must point to a commit contained in origin/prod or origin/test."
          exit 1
        fi

        APP_VERSION="${GITHUB_REF_NAME#v}"
        ARTIFACT_VERSION="$APP_VERSION"

        if [[ ! "$APP_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          echo "::error::App version must use x.y.z format: ${APP_VERSION}"
          exit 1
        fi

        echo "Release channel: ${RELEASE_CHANNEL}"
        echo "Building app version: ${APP_VERSION}"
        echo "Artifact version: ${ARTIFACT_VERSION}"
        echo "Prerelease: ${RELEASE_PRERELEASE}"
        echo "Make latest: ${RELEASE_MAKE_LATEST}"

        node -e "
          const fs = require('fs');
          const conf = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
          conf.version = '$APP_VERSION';
          fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(conf, null, 2) + '\n');
        "

        {
          echo "SNACK_ENV=${RELEASE_CHANNEL}"
          echo "SNACK_RELEASE_CHANNEL=${RELEASE_CHANNEL}"
          echo "SNACK_RELEASE_PRERELEASE=${RELEASE_PRERELEASE}"
          echo "SNACK_DESKTOP_VERSION=${ARTIFACT_VERSION}"
        } >> "$GITHUB_ENV"

        {
          echo "app_version=${APP_VERSION}"
          echo "artifact_version=${ARTIFACT_VERSION}"
          echo "release_channel=${RELEASE_CHANNEL}"
          echo "release_prerelease=${RELEASE_PRERELEASE}"
          echo "release_make_latest=${RELEASE_MAKE_LATEST}"
        } >> "$GITHUB_OUTPUT"
